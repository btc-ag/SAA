name: Smoke Tests + Coverage

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run smoke tests
        run: npm test

      - name: Run coverage (with threshold check)
        # npm run coverage ruft c8 mit --check-coverage auf;
        # Schwellen aus .c8rc.json (Lines/Branches/Functions).
        # Job schlägt fehl, wenn eine Schwelle unterschritten wird.
        run: npm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
